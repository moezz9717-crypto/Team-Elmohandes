<style>
:root{
  --bg:#eef2f8; --card:#ffffff; --ink:#16203a; --muted:#6b7896; --line:#e3e9f2;
  --brand:#28477e; --brand-d:#1d3563; --accent:#e89b32; --accent-d:#c9831f;
  --study:#2563eb; --homework:#7c3aed; --exam:#0c9d6e;
  --ok:#0c9d6e; --bad:#dc2b50; --r:18px;
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
  --shadow:0 6px 22px rgba(20,30,55,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
*:not(input):not(textarea){-webkit-user-select:none;user-select:none}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Tajawal',system-ui,sans-serif;overscroll-behavior:none}
body{min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
.hidden{display:none!important}

/* ---------- AUTH ---------- */
#auth{min-height:100vh;display:flex;flex-direction:column;overflow-y:auto;
  padding:calc(22px + var(--safe-t)) 22px calc(26px + var(--safe-b));
  background:radial-gradient(120% 75% at 50% -8%,#2e518c 0%,#1b2e54 48%,#152648 100%)}
#authInner{margin:auto;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}
.hero-wrap{position:relative;display:flex;justify-content:center;margin-bottom:2px}
.hero-photo{width:min(148px,40vw);height:auto;cursor:pointer;filter:drop-shadow(0 14px 30px rgba(0,0,0,.5));transition:transform .12s}
.hero-photo:active{transform:scale(.94)}
.gg-bubble{position:absolute;top:14%;left:calc(50% + 74px);right:auto;transform-origin:left center;transform:scale(0);background:#fff;color:#16203a;font-weight:800;font-size:16px;padding:6px 13px;border-radius:15px;border:3px solid #16203a;white-space:nowrap;pointer-events:none;z-index:7;opacity:0}
.gg-bubble:before{content:'';position:absolute;left:-12px;top:50%;transform:translateY(-50%);border:9px solid transparent;border-right-color:#16203a}
.gg-bubble:after{content:'';position:absolute;left:-7px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:#fff}
.gg-bubble.show{animation:ggpop 1.9s cubic-bezier(.2,1.5,.4,1) forwards}
@keyframes ggpop{0%{transform:scale(0) rotate(-10deg);opacity:0}15%{transform:scale(1.2) rotate(6deg);opacity:1}28%{transform:scale(1) rotate(0);opacity:1}82%{transform:scale(1);opacity:1}100%{transform:scale(.92) translateX(10px);opacity:0}}
.fx{position:absolute;pointer-events:none;font-weight:800;z-index:5;will-change:transform,opacity;animation:fxfloat 1.5s ease-out forwards;text-shadow:0 1px 5px rgba(0,0,0,.35)}
@keyframes fxfloat{0%{transform:translate(0,0) scale(.4) rotate(0);opacity:0}15%{opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(1.15) rotate(var(--rot));opacity:0}}
.brand-name{color:#fff;font-weight:800;font-size:25px;letter-spacing:.3px}
.brand-sub{color:#a9bbdd;font-size:14px;margin-top:3px;margin-bottom:20px}
.card{width:100%;background:var(--card);border-radius:24px;padding:22px;box-shadow:0 18px 50px rgba(10,20,45,.35)}
.seg{display:flex;background:#eef2f8;border-radius:14px;padding:5px;margin-bottom:18px}
.seg button{flex:1;padding:11px;border-radius:10px;font-weight:700;font-size:15px;color:var(--muted);transition:.18s}
.seg button.on{background:#fff;color:var(--brand);box-shadow:0 2px 8px rgba(20,30,55,.1)}
.fld{margin-bottom:13px}
.fld label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:6px}
.fld input,.fld select{width:100%;padding:13px 14px;border:1.6px solid var(--line);border-radius:13px;background:#fafbfd;transition:.15s;color:var(--ink)}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--brand);background:#fff}
.email-wrap{display:flex;align-items:stretch;direction:ltr;border:1.6px solid var(--line);border-radius:13px;background:#fafbfd;overflow:hidden;transition:.15s}
.email-wrap:focus-within{border-color:var(--brand);background:#fff}
.email-wrap input{flex:1;border:none;background:transparent;padding:13px 13px;min-width:0;text-align:left}
.email-wrap input:focus{outline:none}
.email-wrap .suffix{padding:0 12px;color:var(--brand);font-weight:700;font-size:13.5px;white-space:nowrap;background:#eef3fb;display:flex;align-items:center}
.hint{font-size:12px;color:var(--muted);margin-top:5px;font-weight:600}
.grade-pick{display:flex;gap:10px}
.grade-pick button{flex:1;padding:14px 8px;border:1.6px solid var(--line);border-radius:13px;background:#fafbfd;font-weight:700;font-size:15px;color:var(--ink);transition:.15s}
.grade-pick button.on{border-color:var(--brand);background:#eef3fb;color:var(--brand)}
.btn-main{width:100%;padding:15px;border-radius:14px;background:linear-gradient(180deg,var(--brand),var(--brand-d));color:#fff;font-weight:800;font-size:16px;margin-top:6px;box-shadow:0 8px 20px rgba(40,71,126,.35);transition:.15s}
.btn-main:active{transform:translateY(1px)}
.btn-main[disabled]{opacity:.6}
.auth-msg{font-size:13.5px;text-align:center;margin-top:12px;padding:11px;border-radius:11px;font-weight:600;line-height:1.6}
.auth-msg.err{background:#fdecef;color:var(--bad)}
.auth-msg.ok{background:#e6f7f0;color:var(--ok)}

/* ---------- APP ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#28477e,#1f3a69);color:#fff;
  padding:calc(12px + var(--safe-t)) 16px 12px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(20,30,55,.18)}
.tb-av{width:38px;height:38px;border-radius:11px;object-fit:cover;flex-shrink:0;border:1.5px solid rgba(255,255,255,.25)}
.topbar .tb-txt{flex:1;min-width:0}
.topbar .tb-txt b{display:block;font-size:16.5px;font-weight:800;line-height:1.2}
.topbar .tb-txt span{font-size:12.5px;color:#bcccea}
.icon-btn{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center}
.icon-btn svg{width:21px;height:21px;stroke:#fff}
.main{flex:1;padding:16px 14px calc(96px + var(--safe-b));max-width:560px;width:100%;margin:0 auto}

.page-h{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 14px}
.page-h h2{font-size:21px;font-weight:800;margin:0}
.add-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#fff;font-weight:800;font-size:14px;padding:10px 15px;border-radius:13px;box-shadow:0 6px 16px rgba(232,155,50,.4)}
.add-btn svg{width:17px;height:17px;stroke:#fff;stroke-width:2.6}

.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 15px;border-radius:30px;background:#fff;border:1.5px solid var(--line);font-weight:700;font-size:13.5px;color:var(--muted);transition:.15s}
.chip.on{background:var(--brand);border-color:var(--brand);color:#fff}

.mat{display:flex;align-items:stretch;background:var(--card);border-radius:var(--r);margin-bottom:11px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.mat .spine{width:7px;flex-shrink:0}
.mat .body{flex:1;padding:14px 14px 13px;min-width:0}
.mat .ttl{font-weight:800;font-size:16px;line-height:1.35;margin-bottom:7px;word-break:break-word}
.mat .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tag{font-size:11.5px;font-weight:800;padding:4px 9px;border-radius:20px}
.tag.g{background:#eef3fb;color:var(--brand)}
.tag.pl{background:#fff3e2;color:var(--accent-d)}
.mat .when{font-size:11.5px;color:var(--muted);font-weight:600}
.mat .acts{display:flex;align-items:center;padding:0 12px;gap:2px}
.mat .acts button{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center}
.mat .acts button svg{width:19px;height:19px}
.mat.unpub{opacity:.62}
.dot-hidden{font-size:11px;font-weight:800;color:var(--bad);background:#fdecef;padding:3px 8px;border-radius:20px}

.empty{text-align:center;padding:54px 20px;color:var(--muted)}
.empty .em-ic{font-size:46px;margin-bottom:10px}
.empty b{display:block;color:var(--ink);font-size:17px;margin-bottom:5px}
.empty p{font-size:14px;margin:0;line-height:1.6}
.sec-label{font-size:13px;font-weight:800;color:var(--muted);margin:18px 4px 8px}

.ucard{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:11px;box-shadow:var(--shadow)}
.ucard .top{display:flex;align-items:center;gap:12px}
.av{width:44px;height:44px;border-radius:13px;background:#eef3fb;color:var(--brand);font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ucard .nm{flex:1;min-width:0}
.ucard .nm b{display:block;font-size:15.5px;font-weight:800;line-height:1.3;word-break:break-word}
.ucard .nm span{font-size:12.5px;color:var(--muted);word-break:break-all}
.utags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.uacts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.uacts button{flex:1;min-width:84px;padding:9px;border-radius:11px;font-weight:700;font-size:13px;background:#f1f4fa;color:var(--ink)}
.uacts button.warn{background:#fdecef;color:var(--bad)}
.uacts button.go{background:#eef3fb;color:var(--brand)}
.badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;margin-inline-start:8px}
.badge.off{background:#fdecef;color:var(--bad)}
.badge.as{background:#fff3e2;color:var(--accent-d)}
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:11px 2px;border-bottom:1px solid var(--line)}
.perm-row:last-child{border-bottom:none}
.perm-row .pt{font-weight:700;font-size:14.5px}
.perm-row .pt small{display:block;color:var(--muted);font-weight:500;font-size:12px;margin-top:2px}
.sw{width:50px;height:29px;border-radius:30px;background:#cdd6e6;position:relative;transition:.2s;flex-shrink:0}
.sw.on{background:var(--ok)}
.sw i{position:absolute;top:3px;right:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.sw.on i{right:24px}

.content-hero{display:flex;justify-content:center;margin:2px 0 14px}
.content-hero img{width:116px;height:auto;filter:drop-shadow(0 10px 22px rgba(20,30,55,.22))}
.gtitle{font-size:18px;font-weight:800;text-align:center;margin:2px 0 16px}
.gbtn{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:3px;padding:20px;border-radius:20px;margin-bottom:13px;color:#fff;box-shadow:var(--shadow);transition:transform .1s}
.gbtn:active{transform:scale(.98)}
.gbtn .gn{font-size:20px;font-weight:800}
.gbtn .gc{font-size:13px;opacity:.92;font-weight:600}
.gbtn.g2{background:linear-gradient(135deg,#3a62a8,#28477e)}
.gbtn.g3{background:linear-gradient(135deg,#caa24a,#c9831f)}
.scard{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s}
.scard:active{transform:scale(.98)}
.scard.locked{opacity:.68}
.scard .sic{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:25px;flex-shrink:0}
.scard .sinfo{flex:1;min-width:0}
.scard .sinfo b{font-size:16.5px;font-weight:800;display:block}
.scard .sinfo span{font-size:12.5px;color:var(--muted);font-weight:600}
.scard .chev{width:20px;height:20px;flex-shrink:0}
.lockbtn{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lockbtn.lk{background:#fdecef}.lockbtn.un{background:#e6f7f0}
.lockbadge{display:flex;align-items:center;flex-shrink:0}
.lockbar{display:flex;align-items:center;gap:9px;padding:12px 14px;border-radius:14px;margin-bottom:13px;font-weight:800;font-size:13.5px;cursor:pointer}
.lockbar.lk{background:#fdecef;color:var(--bad)}.lockbar.un{background:#e6f7f0;color:var(--ok)}
.lockbar svg{flex-shrink:0}
.backbtn{display:flex;align-items:center;gap:4px;color:var(--brand);font-weight:800;font-size:14px;background:#eef3fb;padding:8px 13px;border-radius:12px}
.backbtn svg{width:16px;height:16px}
.fab{position:fixed;left:16px;bottom:calc(82px + var(--safe-b));z-index:35;padding:13px 18px;border-radius:30px;background:linear-gradient(180deg,var(--accent),var(--accent-d));color:#fff;font-weight:800;font-size:14.5px;display:inline-flex;align-items:center;gap:7px;box-shadow:0 8px 22px rgba(232,155,50,.5)}
.fab svg{width:18px;height:18px;stroke:#fff;stroke-width:2.8}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;padding:8px 6px calc(8px + var(--safe-b));max-width:560px;margin:0 auto}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;color:var(--muted);font-size:11px;font-weight:700}
.nav button svg{width:24px;height:24px;stroke:var(--muted);stroke-width:2}
.nav button.on{color:var(--brand)}
.nav button.on svg{stroke:var(--brand)}

.sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(15,23,42,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
.sheet{width:100%;max-width:560px;background:var(--card);border-radius:26px 26px 0 0;padding:8px 20px calc(22px + var(--safe-b));max-height:92vh;overflow-y:auto;animation:up .26s cubic-bezier(.2,.9,.3,1)}
.grab{width:42px;height:5px;border-radius:5px;background:#d2dae8;margin:8px auto 14px}
.sheet h3{font-size:19px;font-weight:800;margin:0 0 16px;text-align:center}
@keyframes fade{from{opacity:0}}
@keyframes up{from{transform:translateY(100%)}}
.viewer-bg{position:fixed;inset:0;z-index:70;background:#0d1426;display:flex;flex-direction:column}
.viewer-top{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;color:#fff}
.viewer-top b{flex:1;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.viewer-top button{color:#fff;font-weight:700;font-size:14px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.14)}
.viewer-bg iframe{flex:1;border:none;background:#fff}

#toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(108px + var(--safe-b));z-index:90;
  background:#16203a;color:#fff;padding:12px 20px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.3);opacity:0;transition:.25s;pointer-events:none;max-width:88%;text-align:center}
#toast.show{opacity:1}
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:inline-block;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px 0;color:var(--muted)}
.loading .spin{border-color:rgba(40,71,126,.25);border-top-color:var(--brand)}
.file-drop{border:2px dashed var(--line);border-radius:15px;padding:22px;text-align:center;color:var(--muted);font-weight:700;font-size:14px;background:#fafbfd}
.file-drop.has{border-color:var(--ok);background:#e9f8f1;color:var(--ok)}
.file-drop svg{width:30px;height:30px;stroke:currentColor;display:block;margin:0 auto 8px;stroke-width:1.8}
</style>
</head>

/* ===== AUTH UI ===== */
function setMode(m){MODE=m;
  $('segLogin').classList.toggle('on',m==='login');
  $('segReg').classList.toggle('on',m==='reg');
  $('regOnly').classList.toggle('hidden',m!=='reg');
  $('regExtra').classList.toggle('hidden',m!=='reg');
  $('authBtn').textContent=m==='login'?'تسجيل الدخول':'إنشاء الحساب';
  $('pass').autocomplete=m==='login'?'current-password':'new-password';
  hideMsg();
}
function pickGrade(g){regGrade=g;$('gp2').classList.toggle('on',g===2);$('gp3').classList.toggle('on',g===3);}
function pickPlace(p){regPlace=p;$('plc').classList.toggle('on',p==='center');$('plp').classList.toggle('on',p==='private');}
function showMsg(t,kind){const e=$('authMsg');e.className='auth-msg '+kind;e.innerHTML=t;e.classList.remove('hidden');}
function hideMsg(){$('authMsg').classList.add('hidden');}

async function doAuth(){
  const uname=$('username').value.trim().toLowerCase().replace(/[^a-z0-9._-]/g,'');
  const pass=$('pass').value;
  if(!uname){showMsg('اكتب اسم الدخول','err');return;}
  if(!pass){showMsg('اكتب كلمة السر','err');return;}
  const email=uname+'@'+MAIL_DOMAIN;
  const btn=$('authBtn');btn.disabled=true;const old=btn.textContent;btn.innerHTML='<span class="spin"></span>';
  const reset=()=>{btn.disabled=false;btn.textContent=old;};
  try{
    if(MODE==='reg'){
      const name=$('r_name').value.trim();
      if(!name){showMsg('اكتب اسمك بالكامل','err');return reset();}
      if(!regGrade){showMsg('اختار الصف الدراسي','err');return reset();}
      if(!regPlace){showMsg('اختار المكان (سنتر / بريفت)','err');return reset();}
      if(pass.length<6){showMsg('كلمة السر لازم تكون ٦ حروف على الأقل','err');return reset();}
      const{data,error}=await sb.auth.signUp({email,password:pass,
        options:{data:{full_name:name,phone:$('r_phone').value.trim(),grade:String(regGrade),place:regPlace}}});
      if(error)throw error;
      if(!data.session){
        const r=await sb.auth.signInWithPassword({email,password:pass});
        if(r.error){showMsg('الحساب اتعمل ✅ بس تأكيد الإيميل لسه مفعّل في Supabase. اقفله وجرّب تسجّل دخول.','ok');return reset();}
      }
    }else{
      const{error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)throw error;
    }
    const{data:{session}}=await sb.auth.getSession();
    if(session){await enter();}else{reset();}
  }catch(e){
    let m=e.message||'حصل خطأ';
    if(/invalid login/i.test(m))m='اسم الدخول أو كلمة السر غلط';
    else if(/already registered|already been/i.test(m))m='اسم الدخول ده متسجّل قبل كده، جرّب تسجّل دخول';
    else if(/confirm/i.test(m))m='تأكيد الإيميل مفعّل في Supabase — لازم تقفله الأول';
    else if(/valid email|invalid email/i.test(m))m='اسم الدخول مينفعش — استخدم حروف إنجليزية وأرقام بس';
    showMsg(m,'err');reset();
  }
}

/* ===== BOOT ===== */
async function loadMe(retry=0){
  const{data:{user}}=await sb.auth.getUser();
  if(!user)return null;
  const{data,error}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  if(error)console.error(error);
  if(!data&&retry<3){await new Promise(r=>setTimeout(r,700));return loadMe(retry+1);}
  return data;
}
async function enter(){
  ME=await loadMe();
  if(!ME){toast('الحساب اتوقف أو اتمسح');await sb.auth.signOut();return showAuth();}
  if(ME.active===false){toast('حسابك متوقف — كلّم المدرّس');await sb.auth.signOut();return showAuth();}
  $('auth').classList.add('hidden');
  $('app').classList.remove('hidden');
  $('tbRole').textContent=ME.role==='student'?(GRADES[ME.grade]||'طالب'):ROLE_AR[ME.role];
  tab='materials';buildNav();render();
}
function showAuth(){ME=null;$('app').classList.add('hidden');$('auth').classList.remove('hidden');setMode('login');$('username').value='';$('pass').value='';}
async function signOut(){await sb.auth.signOut();showAuth();}

function buildNav(){
  let items=[['materials','المحتوى']];
  if(ME.role==='teacher')items.push(['users','المستخدمين'],['settings','الإعدادات']);
  else if(ME.role==='assistant'){if(can('manage_students'))items.push(['users','المستخدمين']);items.push(['settings','الإعدادات']);}
  else items.push(['account','حسابي']);
  $('nav').innerHTML=items.map(([k,l])=>`<button class="${tab===k?'on':''}" onclick="go('${k}')">
    <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">${NAV_IC[k]}</svg>${l}</button>`).join('');
}
function go(k){tab=k;if(k==='materials'){matSection=null;if(isStaff())matGrade=null;}buildNav();window.scrollTo(0,0);render();}

function render(){if(tab==='materials')renderMaterials();else if(tab==='users')renderUsers();else renderSettings();}

/* ===== MATERIALS ===== */
let matGrade=null, matSection=null;
const SECTIONS={
  study:{ar:'مراجعات',ic:'📘',c:'#2563eb'},
  homework:{ar:'الواجبات',ic:'📝',c:'#7c3aed'},
  exam:{ar:'إجابات الامتحانات',ic:'✅',c:'#0c9d6e'}
};
function isLocked(g,t){if(t==='study')return false;const v=(window._locks||{})[g+'_'+t];return v===undefined?true:v;}
function lockSvg(sz){sz=sz||18;return `<svg viewBox="0 0 24 24" width="${sz}" height="${sz}" fill="none" stroke="#dc2b50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`;}
function unlockSvg(sz){sz=sz||18;return `<svg viewBox="0 0 24 24" width="${sz}" height="${sz}" fill="none" stroke="#0c9d6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.7-1.3"/></svg>`;}
function heroHeader(){const src=document.querySelector('#auth .hero-photo');return src?`<div class="content-hero"><img src="${src.src}" alt=""></div>`:'';}
function fab(){return can('upload')?`<button class="fab" onclick="openUpload()"><svg viewBox="0 0 24 24" fill="none" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>رفع ملف</button>`:'';}
function backBtn(label){return `<button class="backbtn" onclick="matBack()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg> ${label}</button>`;}

async function renderMaterials(){
  if(ME.role==='student'){matGrade=ME.grade;}
  const v=$('view');v.innerHTML=`<div class="loading"><span class="spin"></span></div>`;
  const[mRes,lRes]=await Promise.all([
    sb.from('materials').select('*').order('created_at',{ascending:false}),
    sb.from('section_locks').select('*')
  ]);
  if(mRes.error){v.innerHTML=`<div class="empty"><div class="em-ic">⚠️</div><b>مش قادر أحمّل المحتوى</b><p>اتأكد إنك شغّلت كود التحديث الجديد في Supabase.</p></div>`;return;}
  window._mats=mRes.data||[];
  window._locks={};(lRes.data||[]).forEach(r=>window._locks[r.grade+'_'+r.type]=r.locked);
  drawContent();
}
function countGT(g,t){return (window._mats||[]).filter(m=>m.grade==g&&(t?m.type===t:true)).length;}
function pickMatGrade(g){matGrade=g;matSection=null;window.scrollTo(0,0);drawContent();}
function matBack(){if(matSection!=null){matSection=null;}else if(isStaff()){matGrade=null;}window.scrollTo(0,0);drawContent();}
function drawContent(){
  if(isStaff()&&matGrade==null)return drawGradeSelect();
  if(matSection==null)return drawSections();
  drawPdfList();
}
function drawGradeSelect(){
  $('view').innerHTML=heroHeader()+`<div class="gtitle">اختار الصف</div>
    <button class="gbtn g2" onclick="pickMatGrade(2)"><span class="gn">الصف الثاني</span><span class="gc">${countGT(2)} ملف</span></button>
    <button class="gbtn g3" onclick="pickMatGrade(3)"><span class="gn">الصف الثالث</span><span class="gc">${countGT(3)} ملف</span></button>`;
}
function drawSections(){
  const g=matGrade;
  const cards=['study','homework','exam'].map(t=>{
    const s=SECTIONS[t];const cnt=countGT(g,t);const locked=isLocked(g,t);
    const stu=ME.role==='student';
    const sub=t==='study'?'مفتوحة دايمًا':(locked?'مقفلة':'مفتوحة');
    const canTog=can('unlock')&&t!=='study';
    let lock='';
    if(t!=='study'){
      if(canTog)lock=`<button class="lockbtn ${locked?'lk':'un'}" onclick="event.stopPropagation();toggleLock('${t}')">${locked?lockSvg():unlockSvg()}</button>`;
      else if(locked)lock=`<span class="lockbadge">${lockSvg(17)}</span>`;
    }
    return `<div class="scard ${locked&&stu?'locked':''}" onclick="openSection('${t}')">
      <div class="sic" style="background:${s.c}1a">${s.ic}</div>
      <div class="sinfo"><b>${s.ar}</b><span>${cnt} ملف · ${sub}</span></div>
      ${lock}
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="#9aa6bf" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </div>`;
  }).join('');
  const head=`<div class="page-h"><h2>المحتوى</h2>${isStaff()?backBtn(GRADES[g]):''}</div>`;
  $('view').innerHTML=heroHeader()+head+cards+fab();

function pickType(b){[...b.parentNode.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');b.parentNode.dataset.v=b.dataset.t;}
function pickUG(b){[...b.parentNode.children].forEach(x=>x.classList.remove('on'));b.classList.add('on');b.parentNode.dataset.v=b.dataset.g;}
function onFile(inp){const f=inp.files[0];if(!f)return;upFile=f;$('drop').classList.add('has');$('dropTxt').textContent='✓ '+f.name;}
async function doUpload(){
  const title=$('u_title').value.trim();
  const type=$('u_type').dataset.v, grade=$('u_grade').dataset.v;
  if(!title)return toast('اكتب عنوان للملف');
  if(!type)return toast('اختار نوع الملف');
  if(!grade)return toast('اختار الصف');
  if(!upFile)return toast('اختار ملف PDF');
  if(upFile.type!=='application/pdf')return toast('الملف لازم يكون PDF');
  const btn=$('upBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> بيترفع…';
  try{
    const safe=upFile.name.replace(/[^\w.\-]+/g,'_').slice(-60);
    const path=`g${grade}/${type}/${crypto.randomUUID()}_${safe}`;
    const up=await sb.storage.from('materials').upload(path,upFile,{contentType:'application/pdf'});
    if(up.error)throw up.error;
    const ins=await sb.from('materials').insert({title,type,grade:Number(grade),file_path:path,file_name:upFile.name,size:upFile.size,published:true,uploaded_by:ME.id});
    if(ins.error){await sb.storage.from('materials').remove([path]);throw ins.error;}
    closeSheet();toast('تم رفع الملف ✅');renderMaterials();
  }catch(e){console.error(e);btn.disabled=false;btn.textContent='رفع الملف';toast('فشل الرفع: '+(e.message||'حصل خطأ'));}
}

function ggBurst(){
  const wrap=document.getElementById('heroWrap');if(!wrap)return;
  const b=document.getElementById('ggBubble');
  b.classList.remove('show');void b.offsetWidth;b.classList.add('show');
  const syms=['π','∑','∫','√','∞','Ω','Δ','λ','∇','θ','µ','≈','±','∂','⚙️','⚛️','📐','📏','🧲','E=mc²','F=ma','V=IR'];
  const cols=['#e89b32','#7fb0ff','#ffffff','#ffd27f','#9be7c4'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span');s.className='fx';
    s.textContent=syms[Math.floor(Math.random()*syms.length)];
    s.style.left=(12+Math.random()*76)+'%';
    s.style.top=(26+Math.random()*48)+'%';
    s.style.setProperty('--dx',(Math.random()*130-65)+'px');
    s.style.setProperty('--dy',(-(115+Math.random()*120))+'px');
    s.style.setProperty('--rot',(Math.random()*140-70)+'deg');
    s.style.fontSize=(15+Math.random()*15)+'px';
    s.style.color=cols[Math.floor(Math.random()*cols.length)];
    wrap.appendChild(s);
    setTimeout(()=>s.remove(),1550);
  }
}
